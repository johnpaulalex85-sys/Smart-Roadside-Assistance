{% extends "base.html" %}
{% block title %}Register — Smart Roadside Assistance{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="rr-card p-4">
            <div class="text-center mb-4">
                <i class="bi bi-person-plus-fill rr-hero-icon text-primary"></i>
                <h2 class="fw-700 mt-2">Create User Account</h2>
                <p class="text-muted small">Join Smart Roadside Assistance today</p>
            </div>

            <form method="POST" action="{{ url_for('auth.register_user') }}">
                <div class="mb-3">
                    <label class="form-label fw-600">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" name="name" placeholder="John Doe" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-600">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" name="email" placeholder="you@example.com" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-600">Phone Number</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                        <input type="tel" class="form-control" name="phone" placeholder="+91 9876543210" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-600">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" name="password" id="regPwd"
                            placeholder="Min 6 characters" minlength="6" required>
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePwd('regPwd',this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-700 rr-btn-main">
                    <i class="bi bi-check-circle me-2"></i>Create Account
                </button>
            </form>

            <p class="text-center mt-3 small">Already have an account? <a href="{{ url_for('auth.login') }}">Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function togglePwd(id, btn) {
        const inp = document.getElementById(id);
        if (inp.type === 'password') { inp.type = 'text'; btn.innerHTML = '<i class="bi bi-eye-slash"></i>'; }
        else { inp.type = 'password'; btn.innerHTML = '<i class="bi bi-eye"></i>'; }
    }
</script>
{% endblock %}
